name: Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-test:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Voeg testbanner toe
        run: |
          sed -i 's|<body>|<body><div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#f59e0b;color:#000;text-align:center;padding:6px;font-weight:700;font-size:13px">TESTOMGEVING</div><div style="height:32px"></div>|' vep-upload-app-v2.html
      - name: Maak index.html
        run: cp vep-upload-app-v2.html index.html
      - name: Publiceer naar vep-clubcasting-dev repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEV_DEPLOY_TOKEN }}
          external_repository: veptennisenpadel/vep-clubcasting-dev
          publish_branch: main
          publish_dir: .
